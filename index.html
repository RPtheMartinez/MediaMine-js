<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaMine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="top-nav">
        <a class="signup-link" href="/login.html">Login</a>
        <a class="signup-link" href="/signup.html">Signup</a>
        <span id="authStatus" class="auth-status hidden" aria-live="polite"></span>
        <button id="logoutBtn" type="button" class="logout-btn hidden">Logout</button>
      </div>
      <h1>📰 MediaMine</h1>
      <p class="subtitle">Top News Headlines by State</p>

      <section class="card">
        <label for="apiKey">NewsAPI Key</label>
        <div class="api-key-row">
          <input
            id="apiKey"
            type="text"
            placeholder="Enter your NewsAPI key"
            autocomplete="off"
          />
          <button id="toggleApiKey" type="button" class="api-key-toggle" aria-pressed="true">Hide</button>
        </div>
        <small>
          Tip: Get a free key at
          <a href="https://newsapi.org/" target="_blank" rel="noreferrer">newsapi.org</a>
        </small>
      </section>

      <section class="card">
        <label for="stateInput">State *</label>
        <input
          id="stateInput"
          type="text"
          placeholder="Start typing a state (e.g., Cal, Tex)"
          list="stateSuggestions"
          autocomplete="off"
        />
        <datalist id="stateSuggestions"></datalist>
        <small>Type a name fragment or 2-letter abbreviation (e.g., CA, NY), then press Enter to apply.</small>

        <div class="source-format">
          <p class="source-format-label">Story Format</p>
          <div class="format-button-row" role="group" aria-label="Choose story format">
            <button type="button" class="format-button" data-format-button data-format="print" aria-pressed="false">PRINT</button>
            <button type="button" class="format-button" data-format-button data-format="video" aria-pressed="false">VIDEO</button>
            <button type="button" class="format-button" data-format-button data-format="mix" aria-pressed="true">MIX</button>
          </div>
        </div>

        <div id="feedback" class="feedback" aria-live="polite"></div>

        <button id="fetchBtn" disabled>Get News Headlines</button>
      </section>

      <section class="card">
        <h2 id="resultsTitle">Results</h2>
        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
